version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: service-backend
    ports:
      - '3000:3000'
    env_file:
      - .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - service-network

  postgres:
    image: postgres:15-alpine
    container_name: service-postgres
    ports:
      - '5433:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Shahed
      - POSTGRES_DB=service_management_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-network

  redis:
    image: redis:7-alpine
    container_name: service-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - service-network

networks:
  service-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
